<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera - Remote Access</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: #238636;
            color: white;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2ea043;
        }

        .btn-secondary {
            background: #374151;
        }

        .camera-container {
            background: #0d1117;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-height: 400px;
        }

        #camera-display {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .placeholder {
            padding: 100px 20px;
            color: #6b7280;
            font-size: 1.2em;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📸 Camera Control</h1>
            <a href="index.html" class="btn btn-secondary">← Back</a>
        </header>

        <div class="controls">
            <!-- Preview Controls -->
            <button class="btn" id="btn-start-preview">▶️ Start Preview</button>
            <button class="btn btn-secondary" id="btn-stop-preview" style="display: none;">⏹️ Stop Preview</button>

            <!-- Photo/Video Controls -->
            <button class="btn" id="btn-photo">📸 Take Photo</button>
            <button class="btn" id="btn-switch">🔄 Switch Camera</button>

            <!-- Recording Controls -->
            <button class="btn" id="btn-start-record">⏺️ Record Video</button>
            <button class="btn btn-secondary" id="btn-stop-record" style="display: none;">bw Stop Recording</button>
        </div>

        <div class="camera-container">
            <div id="status-indicator" style="margin-bottom: 10px; color: #888;">State: IDLE</div>
            <div id="placeholder" class="placeholder">
                Click "Start Preview" to view camera feed
            </div>
            <img id="camera-display" style="display: none;" />
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const deviceId = new URLSearchParams(window.location.search).get('deviceId');
        const imgDisplay = document.getElementById('camera-display');
        const placeholder = document.getElementById('placeholder');
        const statusIndicator = document.getElementById('status-indicator');

        // Buttons
        const btnStartPreview = document.getElementById('btn-start-preview');
        const btnStopPreview = document.getElementById('btn-stop-preview');
        const btnPhoto = document.getElementById('btn-photo');
        const btnSwitch = document.getElementById('btn-switch');
        const btnStartRecord = document.getElementById('btn-start-record');
        const btnStopRecord = document.getElementById('btn-stop-record');

        if (!deviceId) {
            window.location.href = 'index.html';
        }

        // State Machine
        const STATES = {
            IDLE: 'IDLE',
            PREVIEWING: 'PREVIEWING',
            RECORDING: 'RECORDING'
        };
        let currentState = STATES.IDLE;

        function updateUI(state) {
            currentState = state;
            statusIndicator.textContent = `State: ${state}`;

            // Utility to show/hide
            const show = (el) => { el.style.display = 'inline-block'; el.disabled = false; el.style.opacity = '1'; };
            const hide = (el) => el.style.display = 'none';
            const disable = (el) => { el.style.display = 'inline-block'; el.disabled = true; el.style.opacity = '0.5'; };

            switch (state) {
                case STATES.IDLE:
                    show(btnStartPreview);
                    hide(btnStopPreview);
                    show(btnStartRecord);
                    hide(btnStopRecord);
                    show(btnPhoto);
                    show(btnSwitch);

                    hide(imgDisplay);
                    show(placeholder);
                    break;

                case STATES.PREVIEWING:
                    hide(btnStartPreview);
                    show(btnStopPreview);
                    show(btnStartRecord); // Can record while previewing
                    hide(btnStopRecord);
                    show(btnPhoto);
                    show(btnSwitch);

                    show(imgDisplay);
                    hide(placeholder);
                    break;

                case STATES.RECORDING:
                    hide(btnStartPreview);
                    hide(btnStopPreview); // Users want this hidden to prevent accidents
                    hide(btnStartRecord);
                    show(btnStopRecord);
                    disable(btnPhoto); // Visible but disabled
                    hide(btnSwitch);

                    show(imgDisplay); // SHOW THE PREVIEW!
                    show(placeholder); // Use placeholder as overlay
                    placeholder.classList.add('recording-overlay'); // Ensure CSS makes this an overlay
                    placeholder.innerHTML = '<div style="background: rgba(255,0,0,0.7); color: white; padding: 10px; border-radius: 5px;">🔴 Recording...</div>';
                    // We need to ensure placeholder doesn't block the video if it's not styled as absolute overlay
                    // Assuming existing CSS handles it or we inject inline style if safe
                    placeholder.style.position = 'absolute';
                    placeholder.style.top = '10px';
                    placeholder.style.left = '50%';
                    placeholder.style.transform = 'translateX(-50%)';
                    placeholder.style.zIndex = '100';
                    placeholder.style.background = 'transparent';
                    break;
            }
        }

        // --- PREVIEW ---
        async function startPreview() {
            try {
                updateUI(STATES.PREVIEWING); // Optimistic update
                await api.sendCommand(deviceId, 'camera_stream_start');
                api.showToast('Camera preview started', 'success');
            } catch (error) {
                console.error(error);
                api.showToast('Failed to start preview: ' + error.message, 'error');
                updateUI(STATES.IDLE);
            }
        }

        async function stopPreview() {
            try {
                await api.sendCommand(deviceId, 'camera_stream_stop');
                updateUI(STATES.IDLE);
                api.showToast('Camera preview stopped', 'success');
            } catch (error) {
                console.error(error);
                api.showToast('Failed to stop preview: ' + error.message, 'error');
            }
        }

        // Helper to prettify path
        function prettifyPath(path) {
            if (!path) return 'Downloads/RemoteAccess';
            return path.replace('/storage/emulated/0/', '');
        }

        // Track recording path
        let lastRecordingPath = '';

        // --- PHOTO ---
        async function takePhoto() {
            if (!window.api) {
                console.error('API not initialized');
                return;
            }
            try {
                const result = await window.api.sendCommand(deviceId, 'camera_snap');
                if (result.path || result.displayPath) {
                    const displayPath = result.displayPath || prettifyPath(result.path);
                    window.api.showToast(`Photo saved to: ${displayPath}`, 'success');

                    // Prompt file download
                    // Use generic file_download if strictly needed, or just toast
                    // User requirement: "All files... visible in file manager".
                    // Server handles save.
                }
            } catch (error) {
                window.api.showToast('Failed: ' + error.message, 'error');
            }
        }

        // --- SWITCH ---
        async function switchCamera() {
            if (!window.api) return;
            try {
                await window.api.sendCommand(deviceId, 'camera_switch');
                window.api.showToast('Camera switched', 'success');
            } catch (error) {
                window.api.showToast('Failed: ' + error.message, 'error');
            }
        }

        // --- RECORDING ---
        async function startRecording() {
            if (!window.api) return;
            try {
                updateUI(STATES.RECORDING);
                const response = await window.api.sendCommand(deviceId, 'camera_record_start');

                // Store path for stop message
                if (response && response.path) {
                    lastRecordingPath = response.path;
                }

                window.api.showToast('Recording started', 'success');
            } catch (error) {
                console.error(error);
                window.api.showToast('Failed to start recording: ' + error.message, 'error');
                updateUI(STATES.IDLE);
            }
        }

        async function stopRecording() {
            if (!window.api) return;
            try {
                await window.api.sendCommand(deviceId, 'camera_record_stop');
                // USER REQUIREMENT: Stop Recording -> PREVIEWING
                updateUI(STATES.PREVIEWING);

                const displayPath = prettifyPath(lastRecordingPath);
                window.api.showToast(`Recording saved to: ${displayPath}`, 'success');
            } catch (error) {
                console.error(error);
                window.api.showToast('Failed to stop recording: ' + error.message, 'error');
            }
        }

        // Initialize
        updateUI(STATES.IDLE);

        // Event Listeners
        btnStartPreview.addEventListener('click', startPreview);
        btnStopPreview.addEventListener('click', stopPreview);
        btnPhoto.addEventListener('click', takePhoto);
        btnSwitch.addEventListener('click', switchCamera);
        btnStartRecord.addEventListener('click', startRecording);
        btnStopRecord.addEventListener('click', stopRecording);

        // WebSocket for Camera Frames
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log('Camera WebSocket connected');
            // Send initial ping or identification if needed
            ws.send(JSON.stringify({ type: 'identify', deviceId: 'browser' }));
        };

        ws.onmessage = (event) => {
            try {
                const message = JSON.parse(event.data);

                // Handle Camera Frames
                if (message.type === 'camera_frame' && message.deviceId === deviceId) {
                    if (currentState === STATES.PREVIEWING) {
                        // Optimistic update if still in "Start Preview" loading phase
                        if (imgDisplay.style.display === 'none') {
                            document.getElementById('status-indicator').textContent = 'State: PREVIEWING (Receiving Frames)';
                            imgDisplay.style.display = 'block';
                            placeholder.style.display = 'none';
                        }
                        imgDisplay.src = `data:image/jpeg;base64,${message.data}`;
                    }
                }

                // Handle Command Responses (Optional, if we want real-time status updates)
                if (message.type === 'command_result') {
                    // console.log('Command result:', message);
                    // Could update UI based on success/failure here
                }
            } catch (e) {
                // Ignore non-JSON messages
            }
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            // statusIndicator.textContent = 'Connection Error';
        };
    </script>
</body>

</html>
