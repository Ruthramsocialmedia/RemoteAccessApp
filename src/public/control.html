<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control</title>
    <script src="js/api.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .phone-frame {
            background: #222;
            width: 300px;
            height: 500px;
            margin: 20px auto;
            border-radius: 30px;
            border: 3px solid #444;
            position: relative;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        .nav-btn {
            background: #333;
            color: #fff;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #444;
        }

        .text-input {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }

        .text-input input {
            flex: 1;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        .text-input button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }

        .back {
            color: #00ff00;
            text-decoration: none;
        }

        #log {
            background: #000;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back">← Back</a>
    <h1>🖱️ Remote Control</h1>
    <div class="phone-frame" id="phone" onclick="handleTap(event)"></div>
    <div class="controls">
        <button class="nav-btn" onclick="cmd('accessibility_key', {key:'BACK'})">◀</button>
        <button class="nav-btn" onclick="cmd('accessibility_key', {key:'HOME'})">●</button>
        <button class="nav-btn" onclick="cmd('accessibility_key', {key:'RECENTS'})">▣</button>
    </div>
    <div class="text-input">
        <input type="text" id="textInput" placeholder="Type text to send..." />
        <button onclick="sendText()">SEND</button>
    </div>
    <div id="log"></div>
    <script>
        const deviceId = getDeviceIdFromUrl();
        function handleTap(e) {
            const rect = e.target.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / rect.width * 1080);
            const y = Math.round((e.clientY - rect.top) / rect.height * 1920);
            cmd('accessibility_tap', { x, y });
        }
        function sendText() {
            const text = document.getElementById('textInput').value;
            if (text) cmd('accessibility_text', { text });
        }
        async function cmd(action, payload = {}) {
            log(`${action}: ${JSON.stringify(payload)}`);
            const result = await sendCommand(deviceId, action, payload);
            log(`Result: ${JSON.stringify(result)}`);
        }
    </script>
</body>

</html>
