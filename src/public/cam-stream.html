<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Stream</title>
    <script src="js/api.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .video-container {
            background: #000;
            width: 100%;
            max-width: 640px;
            height: 480px;
            margin: 20px auto;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls {
            text-align: center;
            margin: 20px;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }

        button.danger {
            background: #ff4444;
            color: #fff;
        }

        .back {
            color: #00ff00;
            text-decoration: none;
        }

        #log {
            background: #000;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back">← Back</a>
    <h1>📸 Camera Actions</h1>

    <!-- 1. LIVE STREAM -->
    <div class="control-group">
        <h2>📡 Live Stream</h2>
        <div class="video-container" id="preview">
            <span style="color:#666; position:absolute; z-index:0">Camera Preview</span>
            <video id="remoteVideo" autoplay playsinline
                style="width:100%;height:100%;object-fit:contain;z-index:1;background:#000"></video>
        </div>
        <!-- Controls remain same -->
        <div class="controls">
            <button id="btn-start-stream" onclick="cmd('camera_start')" class="primary">▶ START STREAM</button>
            <button id="btn-stop-stream" onclick="cmd('camera_stop_live')" class="danger" disabled>⏹ STOP
                STREAM</button>
            <button id="btn-switch" onclick="cmd('camera_switch')" style="background:#666" disabled>🔄 SWITCH</button>
        </div>
    </div>

    <!-- Rest of UI same until script -->

    <script>
        const deviceId = getDeviceIdFromUrl();
        const STATE = { IDLE: 0, STREAMING: 1, RECORDING: 2 };
        let currentState = STATE.IDLE;

        // Video handling
        const video = document.getElementById('remoteVideo');
        let mediaSource = new MediaSource();
        let sourceBuffer;
        let queue = [];

        video.src = URL.createObjectURL(mediaSource);

        mediaSource.addEventListener('sourceopen', () => {
            // Use generic mime type for Android MediaRecorder H.264
            // Note: Might need specific codec string e.g. 'video/mp4; codecs="avc1.42E01E"'
            try {
                sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');
                sourceBuffer.mode = 'sequence';
                sourceBuffer.addEventListener('updateend', processQueue);
            } catch (e) {
                log('MSE Error: ' + e);
            }
        });

        function processQueue() {
            if (queue.length > 0 && sourceBuffer && !sourceBuffer.updating) {
                try {
                    sourceBuffer.appendBuffer(queue.shift());
                } catch (e) {
                    log('Buffer Error: ' + e);
                }
            }
        }

        // ... (Update UI function same) ...
        function updateUI(state) {
            currentState = state;
            document.getElementById('btn-start-stream').disabled = (state !== STATE.IDLE);
            document.getElementById('btn-stop-stream').disabled = (state !== STATE.STREAMING);
            document.getElementById('btn-switch').disabled = (state !== STATE.STREAMING);
            document.getElementById('btn-record').disabled = (state !== STATE.IDLE);
            document.getElementById('btn-stop-record').disabled = (state !== STATE.RECORDING);
            document.getElementById('btn-snap').disabled = (state !== STATE.IDLE);
        }

        // ... (Cmd function same) ...
        async function cmd(action) {
            // ... existing cmd logic ...
            log(`Sending: ${action}`);
            if (action === 'camera_start') {
                updateUI(STATE.STREAMING);
                // Reset Source
                if (mediaSource.readyState === 'open') {
                    // logic to reset?
                }
            }
            if (action === 'camera_stop_live') updateUI(STATE.IDLE);
            if (action === 'camera_record') updateUI(STATE.RECORDING);
            if (action === 'camera_stop_record') updateUI(STATE.IDLE);

            try {
                const result = await sendCommand(deviceId, action);
                log(`Result: ${JSON.stringify(result)}`);
                if (result.status === 'error') {
                    log(`ERROR: ${result.message}`);
                    updateUI(STATE.IDLE);
                }
            } catch (e) {
                log(`Comms Error: ${e}`);
                updateUI(STATE.IDLE);
            }
        }

        async function downloadRecording() {
            // ... existing download logic ...
            log('Requesting ZIP...');
            const folderPath = "/storage/emulated/0/security recording";
            try {
                const result = await sendCommand(deviceId, 'files_zip', { path: folderPath });
                if (result.status === 'success' || result.zipData) {
                    const link = document.createElement('a');
                    link.href = 'data:application/zip;base64,' + result.zipData;
                    link.download = 'camera_security_files.zip';
                    link.click();
                    log('Zip Download Started');
                } else { log('Error zipping files'); }
            } catch (e) { log('Download failed: ' + e); }
        }

        // Handle WebSocket
        // Note: ws is defined in api.js now
        function onWsOpen() {
            log('WS Connected (Ready)');
        }

        // We check ws periodically or setup listener if already open
        // But api.js initWS is async. We can hook onto global ws.
        // Better: Wait for it.

        setInterval(() => {
            if (ws && !ws.onmessage_custom) {
                ws.onmessage_custom = true;
                const oldHandler = ws.onmessage;
                ws.onmessage = (event) => {
                    if (oldHandler) oldHandler(event); // keep api.js log

                    try {
                        const msg = JSON.parse(event.data);

                        if (msg.action === 'stream_data') {
                            // Convert Base64 to ArrayBuffer
                            const binaryString = window.atob(msg.data);
                            const len = binaryString.length;
                            const bytes = new Uint8Array(len);
                            for (let i = 0; i < len; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }

                            queue.push(bytes);
                            processQueue();
                        }

                        if (msg.action === 'camera_snap_response') {
                            if (msg.status === 'success') log(`✅ SNAP SAVED: ${msg.path}`);
                            else log(`❌ SNAP FAILED: ${msg.message}`);
                        }
                    } catch (e) { }
                };
            }
        }, 1000);

        // Init
        updateUI(STATE.IDLE);
    </script>
</body>

</html>
