<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installed Apps</title>
    <script src="js/api.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .app-card {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .app-card .name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .app-card .package {
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .back {
            color: #00ff00;
            text-decoration: none;
        }

        #log {
            background: #000;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back">← Back</a>
    <h1>📱 Installed Apps</h1>
    <button onclick="refresh()">🔄 Refresh</button>
    <div id="apps" class="app-list">Click refresh to load apps...</div>
    <div id="log"></div>
    <script>
        const deviceId = getDeviceIdFromUrl();
        async function refresh() {
            log('Fetching apps list...');
            await sendCommand(deviceId, 'apps_list');
            log('Command sent. Awaiting response...');
        }
    </script>
</body>

</html>
